<!DOCTYPE html>
<html lang="en-GB" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stats · World Cup 2026</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    .stats-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 1.5rem 80px;
    }
    .stats-page-title {
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 28px;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .stats-page-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    /* Summary number cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px;
      text-align: center;
    }
    .summary-icon { font-size: 20px; margin-bottom: 6px; }
    .summary-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 26px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 5px;
    }
    .summary-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
    }
    /* Section headers */
    .stats-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 16px;
    }
    .stats-section-hdr {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 9px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stats-section-body { padding: 18px; }
    /* Highlight rows */
    .highlight-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .highlight-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .highlight-item--link {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    .highlight-item--link:hover {
      border-color: var(--accent);
      background: var(--surface);
    }
    .highlight-item--link .hl-link-arrow {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent);
      align-self: center;
      flex-shrink: 0;
    }
    .hl-icon { font-size: 20px; flex-shrink: 0; width: 28px; text-align: center; }
    .hl-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .hl-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.4;
    }
    /* Results breakdown */
    .result-breakdown {
      display: flex;
      gap: 0;
      border-radius: var(--radius-sm);
      overflow: hidden;
      height: 10px;
      margin: 8px 0 12px;
    }
    .rb-home  { background: #3dba6e; }
    .rb-draw  { background: var(--muted); }
    .rb-away  { background: #e05252; }
    .rb-labels {
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .rb-labels span { display: flex; align-items: center; gap: 5px; }
    .rb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    /* Chart containers */
    .chart-wrap {
      position: relative;
      width: 100%;
    }
    /* Player accuracy table */
    .acc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .acc-table th {
      text-align: left;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 6px 10px 10px;
      border-bottom: 1px solid var(--border);
    }
    .acc-table td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border2);
      color: var(--text);
    }
    .acc-table tr:last-child td { border-bottom: none; }
    .acc-bar-wrap {
      background: var(--surface2);
      border-radius: 4px;
      height: 6px;
      width: 100%;
      max-width: 80px;
      overflow: hidden;
    }
    .acc-bar { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.4s; }
    @media (max-width: 600px) {
      .acc-bar-col { display: none; }
    }
    /* No data */
    .no-data {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 14px;
    }
    .no-data-icon { font-size: 36px; margin-bottom: 12px; }
    @media (max-width: 600px) {
      .highlight-grid { grid-template-columns: 1fr; }
      .summary-grid { grid-template-columns: repeat(3, 1fr); }
    }
    /* Live leaderboard tabs */
    .live-tab-bar {
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .live-tab-bar::-webkit-scrollbar { display: none; }
    .live-tab-btn {
      flex-shrink: 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 11px 18px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    .live-tab-btn:hover { color: var(--text); }
    .live-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
    .live-tab-count {
      display: inline-block;
      margin-left: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 9px;
      vertical-align: middle;
    }
    .live-tab-btn.active .live-tab-count {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    /* Live table rows */
    .live-rank-medal { font-size: 16px; }
    .live-count-cell {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--accent);
      text-align: right;
      font-size: 15px;
    }
  </style>
</head>

</nav>

    <a href="predictions.html">Group Predictions</a>
    <a href="knockout.html">Knockout Predictions</a>
    <a href="bracket.html">Bracket</a>
    <a href="bonus-extras.html">Tie Breakers</a>
    <a href="results.html">Results</a>
    <a href="stats.html">Stats</a>
  </div>

</nav>

<div class="stats-page" id="statsPage">
  <div id="statsContent">
    <div class="no-data"><div class="no-data-icon">⏳</div>Loading stats…</div>
  </div>
  <div id="liveTablesSection"></div>
  <div id="adminLiveSection" style="display:none;"></div>
</div>

<script>
const $ = id => document.getElementById(id);

// ── Theme ──────────────────────────────────────────────────────────────────────
const themeToggle = $('themeToggle');
const html = document.documentElement;
const savedTheme = localStorage.getItem('wc26_theme') || 'light';
html.dataset.theme = savedTheme;
themeToggle.innerHTML = savedTheme === 'dark' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-regular fa-sun"></i>';
themeToggle.addEventListener('click', () => {
  const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
  html.dataset.theme = next;
  localStorage.setItem('wc26_theme', next);
  themeToggle.innerHTML = next === 'dark' ? '<i class="fa-solid fa-moon"></i>' : '<i class="fa-regular fa-sun"></i>';
  renderAll(window._statsData);
});


// ── Chart theme helpers ────────────────────────────────────────────────────────
function chartColors() {
  const dark = html.dataset.theme !== 'light';
  return {
    text:    dark ? '#c8d0dc' : '#1a2a3a',
    muted:   dark ? 'rgba(200,208,220,0.35)' : 'rgba(0,0,0,0.2)',
    accent:  '#f47b20',
    green:   '#3dba6e',
    red:     '#e05252',
    teal:    '#2ec4b6',
    surface: dark ? '#1e2535' : '#ffffff',
    grid:    dark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.07)',
  };
}

const activeCharts = [];
function destroyCharts() { activeCharts.forEach(c => c.destroy()); activeCharts.length = 0; }

function baseChartOpts(cc) {
  return {
    responsive: true,
    maintainAspectRatio: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 10 } }, grid: { color: cc.grid } },
      y: { ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 10 } }, grid: { color: cc.grid }, beginAtZero: true },
    },
  };
}

// ── Render ─────────────────────────────────────────────────────────────────────
function renderAll(s) {
  destroyCharts();
  const el = $('statsContent');
  if (!s || !s.gamesPlayed) {
    el.innerHTML = `<div class="no-data"><div class="no-data-icon">⚽</div><p>No results recorded yet — check back once games kick off.</p></div>`;
    return;
  }
  const cc = chartColors();
  const flag = code => code ? `<span class="flag fi fi-${code.toLowerCase()}" style="vertical-align:middle;margin-right:3px;"></span>` : '';

  // ── Summary cards ──────────────────────────────────────────────────────────
  const topScorer    = (_liveData.topScorers || [])[0];
  const topScorerNames = topScorer
    ? (_liveData.topScorers || []).filter(r => r.count === topScorer.count).map(r => r.name).join(' & ')
    : null;
  const topPredictor = (s.playerAccuracy || [])[0];
  const totalOwnGoals = (_liveData.ownGoals || []).reduce((sum, r) => sum + (r.count || 0), 0);
  const summaryCards = [
    ['⚽', s.totalGoals,             'Total Goals'],
    ['📊', s.avgGoals,               'Goals / Game'],
    ['📅', s.goalsPerDay != null ? s.goalsPerDay : '—', 'Goals / Day'],
    ['🎮', s.gamesPlayed,            'Games Played'],
    ['🤝', s.draws,                  'Draws'],
    ['🧤', s.cleanSheets,            'Clean Sheets'],
    ['🎯', s.overallPct != null ? s.overallPct + '%' : '—', 'Prediction Accuracy'],
    ['💎', s.perfectPct != null ? s.perfectPct + '%' : '—', 'Perfect Scores'],
    ['🔴', totalOwnGoals > 0 ? totalOwnGoals : '—', 'Own Goals'],
  ].map(([icon, val, lbl]) => `
    <div class="summary-card">
      <div class="summary-icon">${icon}</div>
      <div class="summary-value">${val}</div>
      <div class="summary-label">${lbl}</div>
    </div>`).join('') + (topScorer ? `
    <div class="summary-card" style="cursor:pointer;" onclick="document.getElementById('sectionTopScorers')?.scrollIntoView({behavior:'smooth',block:'start'})">
      <div class="summary-icon">🏅</div>
      <div class="summary-value" style="font-size:14px;line-height:1.2;padding-top:2px;">${topScorerNames}</div>
      <div class="summary-label" style="margin-top:4px;">Top Scorer · ${topScorer.count} goal${topScorer.count !== 1 ? 's' : ''}</div>
    </div>` : '') + (s.mostPredictedScoreline ? `
    <div class="summary-card">
      <div class="summary-icon">🗳️</div>
      <div class="summary-value" style="font-size:20px;">${s.mostPredictedScoreline.scoreline}</div>
      <div class="summary-label">Most Common Prediction · ${s.mostPredictedScoreline.count}×</div>
    </div>` : '') + (s.mostAccuratePredScoreline ? `
    <div class="summary-card">
      <div class="summary-icon">✅</div>
      <div class="summary-value" style="font-size:20px;">${s.mostAccuratePredScoreline.scoreline}</div>
      <div class="summary-label">Most Accurate Prediction · ${s.mostAccuratePredScoreline.count}×</div>
    </div>` : '') + (s.mostCommonScoreline ? `
    <div class="summary-card">
      <div class="summary-icon">🔁</div>
      <div class="summary-value" style="font-size:20px;">${s.mostCommonScoreline.scoreline}</div>
      <div class="summary-label">Most Common Result · ${s.mostCommonScoreline.count}×</div>
    </div>` : '') + (topPredictor ? `
    <div class="summary-card" style="cursor:pointer;" onclick="document.getElementById('sectionPlayerAccuracy')?.scrollIntoView({behavior:'smooth',block:'start'})">
      <div class="summary-icon">🎯</div>
      <div class="summary-value" style="font-size:14px;line-height:1.2;padding-top:2px;">${topPredictor.name}</div>
      <div class="summary-label" style="margin-top:4px;">Top Predictor · ${topPredictor.pct}%</div>
    </div>` : '') + (() => {
    const totalCards = (_liveData.yellowCards || []).reduce((sum, r) => sum + (r.count || 0), 0)
                     + (_liveData.redCards    || []).reduce((sum, r) => sum + (r.count || 0), 0);
    const ratio = totalCards > 0 ? (s.totalGoals / totalCards).toFixed(2) : '—';
    return `
    <div class="summary-card">
      <div class="summary-icon">🃏</div>
      <div class="summary-value">${ratio}</div>
      <div class="summary-label">FairFun Ratio</div>
    </div>`;
  })();

  // ── Highlights ──────────────────────────────────────────────────────────────
  const hl = s.highestGame, bw = s.biggestWin;
  const topYellow = topTeamByCount(_liveData.yellowCards);
  const topRed    = topTeamByCount(_liveData.redCards);
  const highlights = [
    hl
      ? ['🔥', 'Highest Scoring Game', `${hl.homeTeam} ${hl.homeGoals}–${hl.awayGoals} ${hl.awayTeam} &nbsp;·&nbsp; ${hl.homeGoals + hl.awayGoals} goals`]
      : null,
    s.highestDraw
      ? ['🤝', 'Highest Scoring Draw', `${s.highestDraw.homeTeam} ${s.highestDraw.homeGoals}–${s.highestDraw.awayGoals} ${s.highestDraw.awayTeam}`]
      : null,
    topYellow
      ? ['🟨', 'Most Yellow Cards (Team)', `${topYellow[0]} &nbsp;·&nbsp; ${topYellow[1]} cards`]
      : null,
    topRed
      ? ['🟥', 'Most Red Cards (Team)', `${topRed[0]} &nbsp;·&nbsp; ${topRed[1]} cards`]
      : null,
    s.easiestGroup
      ? ['🎯', 'Easiest Group to Predict', `Group ${s.easiestGroup.group} &nbsp;·&nbsp; ${s.easiestGroup.pts} pts scored`]
      : null,
    s.hardestGroup
      ? ['😬', 'Hardest Group to Predict', `Group ${s.hardestGroup.group} &nbsp;·&nbsp; ${s.hardestGroup.pts} pts scored`]
      : null,
  ].filter(Boolean).map(([icon, lbl, val]) => `
    <div class="highlight-item">
      <span class="hl-icon">${icon}</span>
      <div><div class="hl-label">${lbl}</div><div class="hl-value">${val}</div></div>
    </div>`).join('');

  // ── Player accuracy table ───────────────────────────────────────────────────
  const playerRows = (s.playerAccuracy || []).map((p, i) => `
    <tr>
      <td style="font-weight:600;">${i + 1}. ${p.name}</td>
      <td style="font-family:'JetBrains Mono',monospace;text-align:center;">${p.correct}/${p.total}</td>
      <td style="font-family:'JetBrains Mono',monospace;text-align:center;">${p.exact}</td>
      <td class="acc-bar-col">
        <div class="acc-bar-wrap"><div class="acc-bar" style="width:${p.pct}%"></div></div>
      </td>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--accent);text-align:right;">${p.pct}%</td>
      <td style="font-family:'JetBrains Mono',monospace;color:var(--muted);text-align:right;" title="Average goals off per match">${p.avgVariance != null ? '±' + p.avgVariance : '—'}</td>
    </tr>`).join('');

  el.innerHTML = `
    <div class="stats-page-title">Tournament Stats</div>
    <div class="stats-page-sub" id="statsSub">Loading…</div>

    <div class="summary-grid">${summaryCards}</div>

    <div class="stats-section">
      <div class="stats-section-hdr"><i class="fa-solid fa-star"></i> Highlights</div>
      <div class="stats-section-body">
        <div class="highlight-grid">${highlights}</div>
      </div>
    </div>




    <div class="stats-section">
      <div class="stats-section-hdr"><i class="fa-solid fa-layer-group"></i> Goals by Group</div>
      <div class="stats-section-body">
        <div class="chart-wrap" style="height:220px;"><canvas id="chartGroups"></canvas></div>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-section-hdr"><i class="fa-solid fa-list-ol"></i> Most Common Scorelines</div>
      <div class="stats-section-body">
        <div class="chart-wrap" style="height:${Math.max(180, (s.scorelineDist || []).length * 36)}px;"><canvas id="chartScorelines"></canvas></div>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-section-hdr"><i class="fa-solid fa-bullseye"></i> Prediction Accuracy per Match</div>
      <div class="stats-section-body">
        <div id="chartAccuracyScroll" style="overflow-x:auto;width:100%;">
          <div class="chart-wrap" id="chartAccuracyWrap" style="height:240px;"><canvas id="chartAccuracy"></canvas></div>
        </div>
      </div>
    </div>

    <div class="stats-section" id="sectionPlayerAccuracy">
      <div class="stats-section-hdr"><i class="fa-solid fa-trophy"></i> Player Prediction Accuracy</div>
      <div class="stats-section-body" style="padding:0;">
        <table class="acc-table">
          <thead><tr><th>Player</th><th style="text-align:center;">Correct</th><th style="text-align:center;">Exact</th><th class="acc-bar-col">Accuracy</th><th></th><th style="text-align:right;" title="Average goals off per match">Avg Variance</th></tr></thead>
          <tbody>${playerRows}</tbody>
        </table>
      </div>
    </div>

    <div class="stats-section">
      <div class="stats-section-hdr"><i class="fa-solid fa-scale-balanced"></i> FairFun Ratio — Historical Comparison</div>
      <div class="stats-section-body">
        <p style="font-size:12px;color:var(--muted);margin:0 0 12px;">Goals ÷ total cards per tournament. Higher = more goals relative to cards.</p>
        <div class="chart-wrap" style="height:260px;"><canvas id="chartFairFun"></canvas></div>
      </div>
    </div>

`;

  // ── Sub heading ────────────────────────────────────────────────────────────
  $('statsSub').textContent = `${s.gamesPlayed} game${s.gamesPlayed !== 1 ? 's' : ''} played · ${s.totalGoals} goals scored`;

  // ── Chart: Goals by group ──────────────────────────────────────────────────
  const groupKeys   = Object.keys(s.goalsByGroup || {}).sort();
  const groupGoals  = groupKeys.map(g => s.goalsByGroup[g]);
  const groupPlayed = groupKeys.map(g => s.matchesByGroup[g]);
  if (groupKeys.length) {
    const ctx = $('chartGroups').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: groupKeys.map(g => 'Group ' + g),
        datasets: [
          { label: 'Goals', data: groupGoals, backgroundColor: cc.teal, borderRadius: 4 },
          { label: 'Games', data: groupPlayed, backgroundColor: cc.muted, borderRadius: 4 },
        ],
      },
      options: {
        ...baseChartOpts(cc),
        plugins: { legend: { display: true, labels: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 10 } } } },
      },
    });
    activeCharts.push(chart);
  }

  // ── Chart: Scoreline distribution (horizontal bar) ─────────────────────────
  const dist = s.scorelineDist || [];
  if (dist.length) {
    const ctx = $('chartScorelines').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: dist.map(d => d.scoreline),
        datasets: [{ label: 'Times', data: dist.map(d => d.count), backgroundColor: cc.accent, borderRadius: 4 }],
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 10 }, stepSize: 1 }, grid: { color: cc.grid }, beginAtZero: true },
          y: { ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 12 } }, grid: { display: false } },
        },
      },
    });
    activeCharts.push(chart);
  }

  // ── Chart: Prediction accuracy per match ───────────────────────────────────
  const accData = s.accuracyChart || [];
  if (accData.length) {
    const barWidth = 28;
    const minWidth = $('chartAccuracyScroll').offsetWidth;
    const canvasWidth = Math.max(minWidth, accData.length * barWidth);
    $('chartAccuracyWrap').style.width = canvasWidth + 'px';
    $('chartAccuracyWrap').style.height = '240px';
    const ctx = $('chartAccuracy').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: accData.map(m => m.label),
        datasets: [{
          label: '% Correct',
          data: accData.map(m => m.pct),
          backgroundColor: accData.map(m => m.pct >= 50 ? cc.green : cc.red),
          borderRadius: 3,
        }],
      },
      options: {
        ...baseChartOpts(cc),
        maintainAspectRatio: false,
        scales: {
          x: { ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 9 }, maxRotation: 45 }, grid: { color: cc.grid } },
          y: { ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 10 } }, grid: { color: cc.grid }, beginAtZero: true, max: 100 },
        },
      },
    });
    activeCharts.push(chart);
    const scroll = $('chartAccuracyScroll');
    scroll.scrollLeft = scroll.scrollWidth;
  }

  // ── Chart: FairFun Ratio historical ───────────────────────────────────────
  {
    const totalCards = (_liveData.yellowCards || []).reduce((s, r) => s + (r.count || 0), 0)
                     + (_liveData.redCards    || []).reduce((s, r) => s + (r.count || 0), 0);
    const current2026Ratio = totalCards > 0 && s.totalGoals > 0
      ? parseFloat((s.totalGoals / totalCards).toFixed(2)) : null;

    const historical = [
      { year: '2006', ratio: parseFloat((147 / (345 + 28)).toFixed(2)) },
      { year: '2010', ratio: parseFloat((143 / (260 + 17)).toFixed(2)) },
      { year: '2014', ratio: parseFloat((171 / (187 + 10)).toFixed(2)) },
      { year: '2018', ratio: parseFloat((169 / (219 +  4)).toFixed(2)) },
      { year: '2022', ratio: parseFloat((172 / (227 +  4)).toFixed(2)) },
    ];
    if (current2026Ratio !== null) historical.push({ year: '2026 ★', ratio: current2026Ratio });

    const labels = historical.map(d => d.year);
    const ratios = historical.map(d => d.ratio);
    const colors = historical.map(d => d.year.startsWith('2026') ? cc.accent : cc.teal);

    const ctx = $('chartFairFun').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'FairFun Ratio (goals ÷ cards)',
          data: ratios,
          backgroundColor: colors,
          borderRadius: 4,
        }],
      },
      options: {
        ...baseChartOpts(cc),
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => ` ${ctx.parsed.y.toFixed(2)} goals per card`,
            },
          },
          annotation: {
            annotations: {
              line1: {
                type: 'line',
                yMin: 1, yMax: 1,
                borderColor: cc.muted,
                borderWidth: 1,
                borderDash: [4, 4],
              },
            },
          },
        },
        scales: {
          x: { ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 11 } }, grid: { color: cc.grid } },
          y: {
            ticks: { color: cc.text, font: { family: "'JetBrains Mono', monospace", size: 10 }, callback: v => v.toFixed(2) },
            grid: { color: cc.grid },
            beginAtZero: true,
          },
        },
      },
    });
    activeCharts.push(chart);
  }
}

// ── Live tables (scorers / cards) ──────────────────────────────────────────────
let _activeLiveTab = 'topScorers';

function renderLiveTables(live) {
  const el = $('liveTablesSection');
  if (!el) return;

  const cats = [
    { key: 'topScorers',  label: '⚽ Total Goals',  col: 'Total Goals' },
    { key: 'ownGoals',    label: '🔴 Own Goals',    col: 'Goals' },
    { key: 'yellowCards', label: '🟨 Yellow Cards', col: 'Cards' },
    { key: 'redCards',    label: '🟥 Red Cards',    col: 'Cards' },
  ];

  const hasAny = cats.some(c => (live[c.key] || []).length > 0);
  if (!hasAny) { el.innerHTML = ''; return; }

  // If active tab is empty, switch to first tab with data
  if (!(live[_activeLiveTab] || []).length) {
    _activeLiveTab = cats.find(c => (live[c.key] || []).length > 0)?.key || 'topScorers';
  }

  const medals = ['🥇', '🥈', '🥉'];

  const makeRows = (cat) => {
    const rows = live[cat.key] || [];
    if (!rows.length) return `<p style="padding:24px 18px;color:var(--muted);font-size:13px;">No data recorded yet.</p>`;
    const trs = rows.map((r, i) => {
      const fc   = (_allTeamsMeta[r.team]?.flagCode || r.team || '').toLowerCase();
      const flag = fc ? `<span class="flag fi fi-${fc}" style="vertical-align:middle;margin-right:5px;"></span>` : '';
      const rank = i < 3
        ? `<span class="live-rank-medal">${medals[i]}</span>`
        : `<span style="font-family:'JetBrains Mono',monospace;color:var(--muted);font-size:12px;">${i + 1}</span>`;
      return `<tr>
        <td style="width:36px;text-align:center;">${rank}</td>
        <td style="font-weight:600;">${r.name}</td>
        <td>${flag}<span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);">${r.team || ''}</span></td>
        <td class="live-count-cell">${r.count}</td>
      </tr>`;
    }).join('');
    return `<table class="acc-table">
      <thead><tr><th>#</th><th>Player</th><th>Team</th><th style="text-align:right;">${cat.col}</th></tr></thead>
      <tbody>${trs}</tbody>
    </table>`;
  };

  const tabBar = cats.map(c => {
    const entries = live[c.key] || [];
    const count = c.key === 'topScorers'
      ? entries.reduce((sum, r) => sum + (r.count || 0), 0)
      : entries.length;
    if (!count) return '';
    return `<button class="live-tab-btn${c.key === _activeLiveTab ? ' active' : ''}"
              onclick="switchLiveTab('${c.key}')">${c.label}<span class="live-tab-count">${count}</span></button>`;
  }).join('');

  const panels = cats.map(c => `
    <div id="livePanel_${c.key}" style="display:${c.key === _activeLiveTab ? 'block' : 'none'};">
      ${makeRows(c)}
    </div>`).join('');

  el.innerHTML = `
    <div class="stats-section" id="sectionTopScorers">
      <div class="live-tab-bar">${tabBar}</div>
      <div style="padding:0;">${panels}</div>
    </div>`;
}

function switchLiveTab(key) {
  _activeLiveTab = key;
  document.querySelectorAll('.live-tab-btn').forEach(b => {
    const active = b.getAttribute('onclick')?.includes(`'${key}'`);
    b.classList.toggle('active', !!active);
  });
  document.querySelectorAll('[id^="livePanel_"]').forEach(p => {
    p.style.display = p.id === `livePanel_${key}` ? 'block' : 'none';
  });
}

// ── Admin live editor ──────────────────────────────────────────────────────────
let _liveData      = { topScorers: [], ownGoals: [], yellowCards: [], redCards: [] };
let _allTeams      = [];
let _allTeamsMeta  = {};   // name → { flagCode }
let _activeCategory = 'topScorers';
let _activeTeam     = '';

const LIVE_CATS = [
  { key: 'topScorers',  label: '⚽ Goalscorers', col: 'Total Goals' },
  { key: 'ownGoals',    label: '🔴 Own Goals',   col: 'Goals' },
  { key: 'yellowCards', label: '🟨 Yellow Cards', col: 'Cards' },
  { key: 'redCards',    label: '🟥 Red Cards',    col: 'Cards' },
];

function topTeamByCount(arr) {
  const totals = {};
  (arr || []).forEach(r => { if (r.team) totals[r.team] = (totals[r.team] || 0) + (r.count || 0); });
  const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
  if (!sorted.length) return null;
  const top = sorted[0][1];
  const names = sorted.filter(([, v]) => v === top).map(([k]) => k).join(' & ');
  return [names, top];
}

function renderAdminLive() {
  const el = $('adminLiveSection');
  if (!el) return;

  const catTabs = LIVE_CATS.map(c => `
    <button class="tab-btn${c.key === _activeCategory ? ' active' : ''}"
            style="font-size:13px;padding:6px 14px;"
            onclick="setLiveCategory('${c.key}')">${c.label}</button>`).join('');

  const teamOpts = _allTeams.map(t => {
    const fc = _allTeamsMeta[t]?.flagCode || '';
    return `<option value="${t}"${t === _activeTeam ? ' selected' : ''}>${t}</option>`;
  }).join('');

  el.innerHTML = `
    <div class="stats-section" style="margin-bottom:16px;">
      <div class="stats-section-hdr"><i class="fa-solid fa-pen-to-square" style="color:var(--accent);"></i> Edit Live Tables (Admin)</div>
      <div class="stats-section-body">
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;">${catTabs}</div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
          <label style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace;">Team</label>
          <select id="liveTeamSelect" class="live-input" onchange="setLiveTeam(this.value)" style="width:220px;">
            <option value="">— Select a team —</option>${teamOpts}
          </select>
        </div>
        <div id="livePlayerRows"></div>
        <div style="display:flex;align-items:center;gap:12px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
          <button class="btn btn-primary" onclick="saveLiveData()">Save All</button>
          <span id="liveSaveFeedback" style="font-size:13px;color:var(--muted);"></span>
        </div>
      </div>
    </div>`;

  renderLivePlayerRows();
}

function setLiveCategory(key) {
  _activeCategory = key;
  renderAdminLive();
}

function setLiveTeam(team) {
  _activeTeam = team;
  renderLivePlayerRows();
}

function renderLivePlayerRows() {
  const el = $('livePlayerRows');
  if (!el) return;

  if (!_activeTeam) {
    el.innerHTML = '<p style="color:var(--muted);font-size:13px;">Select a team above to view and edit players.</p>';
    return;
  }

  const fc   = (_allTeamsMeta[_activeTeam]?.flagCode || '').toLowerCase();
  const flag = fc ? `<span class="flag fi fi-${fc}" style="margin-right:6px;vertical-align:middle;"></span>` : '';
  const list = (_liveData[_activeCategory] || []).filter(r => r.team === _activeTeam);
  const cat  = LIVE_CATS.find(c => c.key === _activeCategory);

  let html = `<div style="font-size:12px;color:var(--muted);margin-bottom:10px;font-family:'JetBrains Mono',monospace;">${flag}${_activeTeam}</div>`;

  if (list.length) {
    html += `<table class="acc-table" style="margin-bottom:16px;">
      <thead><tr>
        <th style="text-align:left;">Player</th>
        <th style="text-align:center;width:120px;">${cat?.col || 'Count'}</th>
        <th style="width:36px;"></th>
      </tr></thead>
      <tbody>`;
    list.forEach(r => {
      const esc = r.name.replace(/'/g, "\\'");
      html += `<tr>
        <td style="font-weight:600;">${r.name}</td>
        <td style="text-align:center;">
          <div style="display:flex;align-items:center;justify-content:center;gap:8px;">
            <button onclick="adjustLiveCount('${_activeCategory}','${esc}','${_activeTeam}',-1)"
                    style="width:28px;height:28px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--text);cursor:pointer;font-size:16px;line-height:1;">−</button>
            <span style="font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);min-width:20px;text-align:center;">${r.count}</span>
            <button onclick="adjustLiveCount('${_activeCategory}','${esc}','${_activeTeam}',1)"
                    style="width:28px;height:28px;background:none;border:1px solid var(--border);border-radius:4px;color:var(--accent);cursor:pointer;font-size:16px;line-height:1;">+</button>
          </div>
        </td>
        <td style="text-align:center;">
          <button onclick="removeLiveEntry('${_activeCategory}','${esc}','${_activeTeam}')"
                  style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:16px;line-height:1;">✕</button>
        </td>
      </tr>`;
    });
    html += `</tbody></table>`;
  } else {
    html += `<p style="color:var(--muted);font-size:13px;margin-bottom:16px;">No entries for this team yet.</p>`;
  }

  html += `
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);">
      <span style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);font-family:'JetBrains Mono',monospace;">New player</span>
      <input id="newPlayerName" class="live-input" placeholder="Player name" style="flex:1;min-width:140px;">
      <input id="newPlayerCount" class="live-input" type="number" min="1" value="1" style="width:60px;">
      <button class="btn btn-outline" onclick="addNewLivePlayer()" style="font-size:12px;padding:5px 14px;">+ Add</button>
    </div>`;

  el.innerHTML = html;
  $('newPlayerName')?.focus();
}

function adjustLiveCount(key, name, team, delta) {
  const list  = _liveData[key] || [];
  const entry = list.find(r => r.name === name && r.team === team);
  if (!entry) return;
  entry.count = Math.max(0, (entry.count || 0) + delta);
  if (entry.count === 0) _liveData[key] = list.filter(r => !(r.name === name && r.team === team));
  renderLivePlayerRows();
}

function removeLiveEntry(key, name, team) {
  _liveData[key] = (_liveData[key] || []).filter(r => !(r.name === name && r.team === team));
  renderLivePlayerRows();
}

function addNewLivePlayer() {
  const name  = $('newPlayerName')?.value.trim();
  const count = parseInt($('newPlayerCount')?.value) || 1;
  if (!name || !_activeTeam) return;
  if (!_liveData[_activeCategory]) _liveData[_activeCategory] = [];
  const existing = _liveData[_activeCategory].find(r => r.name === name && r.team === _activeTeam);
  if (existing) {
    existing.count += count;
  } else {
    _liveData[_activeCategory].push({ name, team: _activeTeam, count });
  }
  _liveData[_activeCategory].sort((a, b) => b.count - a.count);
  renderLivePlayerRows();
}

async function saveLiveData() {
  const fb = $('liveSaveFeedback');
  fb.textContent = 'Saving…';
  fb.style.color = 'var(--muted)';
  try {
    const { token } = Session.load();
    const r = await fetch('/api/admin/tournament-live', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-session-token': token || '' },
      body: JSON.stringify(_liveData),
    });
    const d = await r.json();
    if (d.success) {
      fb.textContent = '✓ Saved';
      fb.style.color = 'var(--ok, #3dba6e)';
      renderLiveTables(_liveData);
    } else {
      fb.textContent = d.error || 'Failed';
      fb.style.color = 'var(--danger)';
    }
  } catch {
    fb.textContent = 'Failed — try again';
    fb.style.color = 'var(--danger)';
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const [s, live, fixtures] = await Promise.all([
      fetch('/api/stats').then(r => r.json()),
      fetch('/api/tournament-live').then(r => r.json()),
      fetch('/api/fixtures').then(r => r.json()),
    ]);
    // Populate team list from all groups
    Object.values(fixtures.groups || {}).flatMap(g => g.teams || []).forEach(t => {
      _allTeamsMeta[t.name] = { flagCode: t.flagCode || '' };
    });
    _allTeams = Object.keys(_allTeamsMeta).sort();
    const me = await API.me().catch(() => ({}));
    window._statsData = s;
    _liveData = live;
    renderAll(s);
    renderLiveTables(live);
    if (me.isAdmin) {
      const adminEl = $('adminLiveSection');
      if (adminEl) { adminEl.style.display = 'block'; renderAdminLive(); }
    }
  } catch {
    $('statsContent').innerHTML = '<div class="no-data"><div class="no-data-icon">⚠️</div><p>Could not load stats — try refreshing.</p></div>';
  }
})();
</script>
